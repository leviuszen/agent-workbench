name: Bug report
description: Report a reproducible Agent Workbench defect using synthetic data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, private source code, personal information, local absolute paths, or unredacted runtime artifacts.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: shell
    attributes:
      label: PowerShell host
      options:
        - Windows PowerShell 5.1
        - PowerShell 7
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Use a temporary repository and fake or redacted values.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Checks already run
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed secrets, personal information, private source code, and local absolute paths.
          required: true
